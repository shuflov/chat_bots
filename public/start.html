<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Conversation</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Back to list</a>
        <h1>🚀 Start New Conversation</h1>
        
        <form id="conversation-form">
            <h3>Initial Message</h3>
            <div class="form-group">
                <label for="initial-message">What should the bots discuss?</label>
                <textarea id="initial-message" rows="3" placeholder="Enter your initial message..." required>What is the meaning of life?</textarea>
            </div>
            
            <h3>Conversation Settings</h3>
            <div class="form-row">
                <div class="form-group">
                    <label for="max-turns">Max Turns</label>
                    <input type="number" id="max-turns" value="20" min="1" max="100" title="Number of conversation turns">
                </div>
                <div class="form-group">
                    <label for="delay">Delay (seconds)</label>
                    <input type="number" id="delay" value="30" min="1" max="300" title="Delay between bot responses">
                </div>
            </div>
            
            <h3>Select Bots</h3>
            <div class="form-row">
                <div class="form-group">
                    <label for="bot1">Bot 1</label>
                    <select id="bot1" aria-label="Select Bot 1"></select>
                </div>
                <div class="form-group">
                    <label for="bot2">Bot 2</label>
                    <select id="bot2" aria-label="Select Bot 2"></select>
                </div>
            </div>
            
            <button type="submit" class="btn-primary">Start Conversation</button>
        </form>
        
        <div class="divider"></div>
        
        <h2>Create New Personality</h2>
        <form id="personality-form">
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="personality-name" placeholder="e.g., Chef" required>
            </div>
            <div class="form-group">
                <label>System Prompt</label>
                <textarea id="personality-prompt" rows="4" placeholder="Describe this personality..." required></textarea>
            </div>
            <button type="submit" class="btn-secondary">Create Personality</button>
        </form>
        
        <div id="custom-personalities"></div>
    </div>
    
    <script src="/script.js"></script>
    <script>
        // Load defaults and personalities
        async function loadDefaults() {
            try {
                const res = await fetch('/api/defaults');
                if (res.ok) {
                    const defaults = await res.json();
                    document.getElementById('max-turns').value = defaults.max_turns;
                    document.getElementById('delay').value = defaults.delay;
                }
            } catch (e) {
                console.log('Using default values');
            }
        }
        
        loadDefaults();
        loadPersonalities();
        
        document.getElementById('conversation-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const initialMessage = document.getElementById('initial-message').value;
            const maxTurns = parseInt(document.getElementById('max-turns').value);
            const delay = parseInt(document.getElementById('delay').value);
            const bot1Id = parseInt(document.getElementById('bot1').value);
            const bot2Id = parseInt(document.getElementById('bot2').value);
            
            const res = await fetch('/api/conversations', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    initial_message: initialMessage,
                    max_turns: maxTurns,
                    delay: delay,
                    bot1_personality_id: bot1Id,
                    bot2_personality_id: bot2Id
                })
            });
            
            if (res.ok) {
                const data = await res.json();
                window.location.href = '/conversation/' + data.id;
            }
        });
        
        document.getElementById('personality-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('personality-name').value;
            const prompt = document.getElementById('personality-prompt').value;
            
            const res = await fetch('/api/personalities', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name, system_prompt: prompt})
            });
            
            if (res.ok) {
                document.getElementById('personality-name').value = '';
                document.getElementById('personality-prompt').value = '';
                loadPersonalities();
            }
        });
    </script>
</body>
</html>
